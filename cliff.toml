# git-cliff ~ https://git-cliff.org/docs/configuration
# Generates CHANGELOG.md from conventional commits.

[changelog]
header = """
# Changelog

All notable changes to GlowGuide are documented here.
The format follows [Keep a Changelog](https://keepachangelog.com/en/1.0.0/)
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
{{ commit.message | upper_first }}\
{% if commit.links %} ([#{{ commit.links | first | get(key="text") }}]({{ commit.links | first | get(key="href") }})){% endif %}\
{% endfor %}
{% endfor %}\n
"""
footer = """
<!-- Generated by git-cliff -->
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat",     group = "✨ Features"       },
  { message = "^fix",      group = "🐛 Bug Fixes"      },
  { message = "^docs",     group = "📚 Documentation"  },
  { message = "^style",    group = "💅 Styling"        },
  { message = "^refactor", group = "♻️  Refactor"       },
  { message = "^perf",     group = "⚡ Performance"    },
  { message = "^test",     group = "🧪 Tests"          },
  { message = "^chore",    group = "🔧 Chores"         },
  { message = "^ci",       group = "🤖 CI/CD"          },
  { message = "^revert",   group = "⏪ Reverts"        },
  { message = "^security", group = "🔒 Security"       },
  { message = "^i18n",     group = "🌐 Internationalisation" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = "beta|alpha"
ignore_tags = ""
sort_commits = "oldest"
