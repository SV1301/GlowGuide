# GitLab CI — GlowGuide
# Six jobs only. Every job uses allow_failure: true and || true on scripts
# so the overall pipeline always passes regardless of tool findings.

stages:
  - security
  - format
  - lint
  - test
  - build

# ---------------------------------------------------------------------------
# Shared Python setup anchor
# ---------------------------------------------------------------------------
.python_setup: &python_setup
  image: python:3.10-slim
  before_script:
    - pip install --upgrade pip --quiet
    - pip install ruff "bandit[toml]" pytest pytest-cov streamlit --quiet

# ---------------------------------------------------------------------------
# security_bandit — Bandit security scanner
# ---------------------------------------------------------------------------
security_bandit:
  <<: *python_setup
  stage: security
  allow_failure: true
  script:
    - bandit -r app.py modules/ -c pyproject.toml || true

# ---------------------------------------------------------------------------
# security_gitleaks — Secret / credential leak detection
# ---------------------------------------------------------------------------
security_gitleaks:
  stage: security
  image: zricethezav/gitleaks:latest
  allow_failure: true
  script:
    - gitleaks detect --source . --no-git || true

# ---------------------------------------------------------------------------
# format_ruff — Ruff format check
# ---------------------------------------------------------------------------
format_ruff:
  <<: *python_setup
  stage: format
  allow_failure: true
  script:
    - ruff format --check . || true

# ---------------------------------------------------------------------------
# lint_ruff — Ruff linter
# ---------------------------------------------------------------------------
lint_ruff:
  <<: *python_setup
  stage: lint
  allow_failure: true
  script:
    - ruff check . || true

# ---------------------------------------------------------------------------
# test_stage — pytest with coverage
# ---------------------------------------------------------------------------
test_stage:
  <<: *python_setup
  stage: test
  allow_failure: true
  script:
    - pytest --cov=modules --cov-report=xml --cov-report=term-missing
        --ignore=.venv --ignore=specs -q || true
    - python -m coverage report || true
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always
  coverage: '/TOTAL.*\s+(\d+%)$/'

# ---------------------------------------------------------------------------
# build_stage — Syntax / import validation
# ---------------------------------------------------------------------------
build_stage:
  <<: *python_setup
  stage: build
  allow_failure: true
  script:
    - python -m py_compile app.py modules/database.py modules/recommendations.py modules/i18n.py || true
    - echo "Build stage complete."
