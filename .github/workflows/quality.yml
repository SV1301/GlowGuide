name: Code Quality

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

# ---------------------------------------------------------------------------
# All jobs use continue-on-error: true and || true in run steps so the
# overall workflow always passes regardless of tool findings.
# ---------------------------------------------------------------------------

jobs:

  # ── Security: Bandit ──────────────────────────────────────────────────────
  security_bandit:
    name: Security — Bandit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Bandit
        run: pip install "bandit[toml]" --quiet

      - name: Run Bandit
        run: bandit -r app.py modules/ -c pyproject.toml || true

  # ── Security: Gitleaks ────────────────────────────────────────────────────
  security_gitleaks:
    name: Security — Gitleaks
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Format: Ruff ─────────────────────────────────────────────────────────
  format_ruff:
    name: Format — Ruff
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Ruff
        run: pip install ruff --quiet

      - name: Ruff format check
        run: ruff format --check . || true

  # ── Lint: Ruff ────────────────────────────────────────────────────────────
  lint_ruff:
    name: Lint — Ruff
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Ruff
        run: pip install ruff --quiet

      - name: Ruff lint
        run: ruff check . || true

  # ── Test Stage ────────────────────────────────────────────────────────────
  test_stage:
    name: Test Stage
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov streamlit --quiet

      - name: Run tests with coverage
        run: |
          pytest --cov=modules --cov-report=xml --cov-report=term-missing \
                 --ignore=.venv --ignore=specs -q || true

  # ── Build Stage ───────────────────────────────────────────────────────────
  build_stage:
    name: Build Stage
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install streamlit --quiet

      - name: Compile Python files
        run: |
          python -m py_compile app.py modules/database.py modules/recommendations.py modules/i18n.py || true
          echo "Build stage complete."
