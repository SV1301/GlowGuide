name: Code Quality

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Secret Scanning ──────────────────────────────────────────────────────
  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for gitleaks

      - name: Gitleaks – detect secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Python quality checks ────────────────────────────────────────────────
  quality:
    name: Quality & Tools
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python setup ─────────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── Install dev dependencies ──────────────────────────────────────────
      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy vulture "bandit[toml]" pylint flake8 semgrep \
                      pyupgrade pytest pytest-cov
          pip install streamlit   # needed for import resolution

      # ── Ruff – lint ───────────────────────────────────────────────────────
      - name: Ruff – lint
        run: ruff check . --output-format=github

      # ── Ruff – format ─────────────────────────────────────────────────────
      - name: Ruff – format check
        run: ruff format --check .

      # ── Flake8 ───────────────────────────────────────────────────────────
      - name: Flake8
        run: flake8 app.py modules/

      # ── Pylint ───────────────────────────────────────────────────────────
      - name: Pylint
        run: pylint app.py modules/ --fail-under=7.0

      # ── Mypy – type checking ──────────────────────────────────────────────
      - name: Mypy – type check
        run: mypy app.py modules/

      # ── Bandit ───────────────────────────────────────────────────────────
      - name: Bandit – security scan
        run: bandit -r app.py modules/ -c pyproject.toml

      # ── Vulture ──────────────────────────────────────────────────────────
      - name: Vulture – dead code
        run: vulture app.py modules/ --min-confidence 80

      # ── Pyupgrade ────────────────────────────────────────────────────────
      - name: Pyupgrade – modern syntax check
        run: |
          find . -name "*.py" \
            -not -path "./.venv/*" \
            -not -path "./specs/*" \
            | xargs pyupgrade --py310-plus

      # ── Semgrep ──────────────────────────────────────────────────────────
      - name: Semgrep – static analysis
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          semgrep \
            --config "p/python" \
            --config "p/bandit" \
            --config ".semgrep.yml" \
            --error \
            app.py modules/

      # ── Coverage reporting ────────────────────────────────────────────────
      - name: Coverage – run tests with coverage
        run: |
          pytest --cov=modules --cov-report=xml --cov-report=term-missing \
                 --ignore=.venv --ignore=specs -q || true

      - name: Coverage – upload report
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Changelog generation ─────────────────────────────────────────────────
  changelog:
    name: Changelog – git-cliff
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog with git-cliff
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}
